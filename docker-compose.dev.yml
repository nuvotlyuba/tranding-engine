name: trading-engine-dev

networks:
  dev:
    driver: bridge

volumes:
  postgres_data_dev:

  go_mod_cache:

  go_build_cache:

  kafka_data_dev:
  zookeeper_data_dev:

  prometheus_data_dev:

  grafana_data_dev:

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"


services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
          - GO_VERSION:1.26.2
    container_name: trading-engine-dev
    restart: unless-stopped
    networks:
      - dev
    ports:
      - "8080:8080"
      # порт для delve debugger
      - "2345:2345"
      # pprof - профилировщик GO
      - "6060:6060"
    environment:
      APP_ENV: development
      LOG_LEVEL: debug
      LOG_FORMAT: text
      DATABASE_URL: postgres://trading:trading_dev@postgres:5432/trading_engine?sslmode=false
      KAFKA_BROKER: kafka:9092
      HTTP_ADDR: 8080
      CACHE_SIZE: 1000
      PPROF_ENABLED: "true"
      PPROF_ADDR: 6060
    volumes:
      - .:/app
      - go_mod_cache:/gp/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
          condition: service_healthy
      # kafka:
      #     condition: service_healthy
    logging: *default-logging

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: trading-postgres-dev
    restart: unless-stopped
    networks:
      - dev
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: tranding_dev
      POSTGRES_DB: trading_engine

    # Отключаем телеметрию TimescaleDB
      TIMESCALEDB_TELEMETRY: "off"
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8"
      TZ: UTC
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      # SQL файлы в этой папке выполняются при первом старте контейнера
      # в алфавитном порядке: 001_init.sql, 002_timescale.sql, и т.д.
      # ВНИМАНИЕ: выполняются только если volume пустой (первый запуск)
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading_engine"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      postgres
      -c max_connections=50
      -c shared_buffers=128MB
      -c work_mem=4MB
      -c log_min_duration_statement=100
      -c log_statement=all
      -c log_lock_waits=on
      -c deadlock_timeout=1s
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Zookeeper — координатор для Kafka
  #
  # В новых версиях Kafka (3.x+) можно использовать KRaft режим без Zookeeper.
  # Но confluent образы всё ещё рекомендуют Zookeeper для стабильности.
  # Для dev это не критично — оставляем классическую схему.
  # ---------------------------------------------------------------------------
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.0
  #   container_name: trading-zookeeper-dev
  #   restart: unless-stopped
  #   networks:
  #     - dev
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #     # Разрешаем команды для healthcheck
  #     KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,mntr"
  #   volumes:
  #     - zookeeper_data_dev:/var/lib/zookeeper/data
  #   healthcheck:
  #     # ruok — "are you ok?" команда Zookeeper, отвечает "imok"
  #     test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   logging: *default-logging

  # # ---------------------------------------------------------------------------
  # # Kafka — брокер сообщений
  # #
  # # Сейчас используется только для будущего расширения.
  # # Когда вырастем до нескольких микросервисов — Event Bus заменим на Kafka.
  # # В dev поднимаем один брокер — в проде минимум 3 для репликации.
  # # ---------------------------------------------------------------------------
  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   container_name: trading-kafka-dev
  #   restart: unless-stopped
  #   networks:
  #     - dev
  #   ports:
  #     # 9092 — для подключения с хоста (IDE, kafkacat, kcat)
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

  #     # Два listener-а — критически важная настройка:
  #     # INTERNAL://kafka:29092 — для связи между контейнерами (app → kafka)
  #     # EXTERNAL://localhost:9092 — для подключения с хоста разработчика
  #     # Без этого либо контейнеры не видят друг друга, либо хост не видит kafka
  #     KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
  #     KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

  #     # В dev создаём топики автоматически — не нужно настраивать вручную
  #     # В проде это ВЫКЛЮЧЕНО — топики создаются явно с нужными параметрами
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  #     # Фактор репликации 1 — нормально для dev, недопустимо для prod
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
  #     KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  #     # Хранить сообщения 24 часа — в dev этого достаточно
  #     KAFKA_LOG_RETENTION_HOURS: 24

  #     # Подробные логи для отладки
  #     KAFKA_LOG4J_LOGGERS: "kafka.controller=INFO,kafka.producer.async=DEBUG"
  #   volumes:
  #     - kafka_data_dev:/var/lib/kafka/data
  #   depends_on:
  #     zookeeper:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
  #     interval: 15s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s
  #   logging: *default-logging

  # # ---------------------------------------------------------------------------
  # # Kafka UI — веб-интерфейс для Kafka
  # #
  # # Позволяет: смотреть топики и сообщения, публиковать тестовые события,
  # # смотреть consumer groups и их lag, управлять конфигурацией.
  # #
  # # Открыть: http://localhost:8090
  # # Аутентификация отключена — только для dev
  # # ---------------------------------------------------------------------------
  # kafka-ui:
  #   image: provectuslabs/kafka-ui:v0.7.2
  #   container_name: trading-kafka-ui-dev
  #   restart: unless-stopped
  #   networks:
  #     - dev
  #   ports:
  #     - "8090:8080"
  #   environment:
  #     KAFKA_CLUSTERS_0_NAME: trading-dev
  #     KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  #     # Показываем сообщения в десериализованном виде
  #     KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT

  #     # В dev аутентификация не нужна
  #     AUTH_TYPE: DISABLED

  #     # Динамическая конфигурация — можно менять без перезапуска
  #     DYNAMIC_CONFIG_ENABLED: "true"
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #   logging: *default-logging

  # # ---------------------------------------------------------------------------
  # # Prometheus — сбор метрик
  # #
  # # Scrape метрики с нашего приложения каждые 5 секунд.
  # # В продакшене интервал обычно 15-30 секунд.
  # #
  # # Открыть: http://localhost:9090
  # # Проверить targets: http://localhost:9090/targets
  # # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: trading-prometheus-dev
    restart: unless-stopped
    networks:
      - dev
    ports:
      - "9090:9090"
    volumes:
      # Конфиг Prometheus — описывает откуда собирать метрики
      - ./deploy/dev/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      # Сохраняем данные между перезапусками
      - prometheus_data_dev:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

      # Хранить данные 7 дней — в dev этого достаточно
      - "--storage.tsdb.retention.time=7d"

      # Максимум 512MB для хранилища метрик
      - "--storage.tsdb.retention.size=512MB"

      # Горячая перезагрузка конфига через HTTP POST
      # curl -X POST http://localhost:9090/-/reload
      - "--web.enable-lifecycle"

      # Подробные логи для отладки
      - "--log.level=debug"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ---------------------------------------------------------------------------
  # Grafana — визуализация метрик
  #
  # Дашборды для: метрик приложения, состояния стакана,
  # производительности матчинга, состояния Event Bus.
  #
  # Открыть: http://localhost:3000
  # Логин: admin / admin (попросит сменить при первом входе)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: trading-grafana-dev
    restart: unless-stopped
    networks:
      - dev
    ports:
      - "3000:3000"
    environment:
      # Дефолтные креды для dev — Grafana попросит сменить при входе
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

      # Разрешаем анонимный просмотр дашбордов — удобно для dev
      # В проде ВЫКЛЮЧИТЬ
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer

      # Отключаем регистрацию новых пользователей
      GF_USERS_ALLOW_SIGN_UP: "false"

      # Отключаем аналитику и телеметрию
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"

      # Плагины которые установятся автоматически при старте
      # Пустой список — стандартных плагинов достаточно
      GF_INSTALL_PLUGINS: ""

      # Timezone для графиков
      GF_DEFAULT_UI_THEME: dark
    volumes:
      # Провизионирование — автоматическая настройка при старте
      # datasources — подключение к Prometheus
      - ./deploy/dev/grafana/datasources:/etc/grafana/provisioning/datasources:ro

      # dashboards — предустановленные дашборды
      - ./deploy/dev/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro

      # Сохраняем созданные дашборды между перезапусками
      - grafana_data_dev:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
