name: trading-engine


# =============================================================================
# Сети — изолируем трафик
# =============================================================================
networks:
  backend:
  # backend — для общения сервисов между собой (БД, Kafka)
  # приложение не должно напрямую смотреть в интернет
    driver: bridge
    internal: false # разрешаем исходящий трафик для скачивания данных


# =============================================================================
# Volumes — персистентные данные
# =============================================================================
volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:


services:
  trading-engine:
    build:
      context: .
      dockerfile: ./docker/dev/.Dockerfile
    container_name: trading_engine
    restart: unless-stopped
    network: 
      - backend
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
      - HTTP_ADDR=:8080
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - KAFKA_BROKER=kafka:9092
      - CACHE_SIZE=10000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limit:
          cpus: "2"
          memory: 512M
        reservations: 
          cpus: "0.5"
          memory: 128M
    # Read-only файловая система — нельзя писать в контейнер
    read_only: true
    tmpfs:
      - /tmp:size=50M,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true