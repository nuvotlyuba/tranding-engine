global:
  # Как часто собирать метрики
  # в dev  5 секунд - видим изменения быстро
  # в prod обычно 15-30 секунд
  scrape_interval: 5s

  # Как часто вычислять правила алертов
  evaluation_interval: 5s

  external_labels:
    environment: development
    project: trading-engine

# Правила алертов - пока пустые
rule_files: []
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus собирает метрики сам с себя
  # Полезно для мониторинга самого Prometheus
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

    # Наше приложение
  # app — имя сервиса в docker-compose
  # /metrics — стандартный путь для Prometheus метрик в Go
  # Приложение должно экспортировать метрики через promhttp.Handler()
  - job_name: trading-engine
    scrape_interval: 5s
    scrape_timeout: 3s
    metrics_path: /metrics
    static_configs:
      - targets:
          - app:8080
        # Лейблы добавляются ко всем метрикам этого job
        labels:
          service: trading-engine
          env: dev

  # PostgreSQL экспортер — если добавишь postgres_exporter
  # Пока закомментировано — раскомментируй когда добавишь контейнер
  # - job_name: postgres
  #   static_configs:
  #     - targets:
  #         - postgres-exporter:9187

  # Kafka экспортер — на будущее
  # - job_name: kafka
  #   static_configs:
  #     - targets:
  #         - kafka-exporter:9308
